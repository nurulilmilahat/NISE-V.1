<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISE - Ma'had Nurul Ilmi</title>
    
    <!-- Library CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Library React & Firebase (Compat Version untuk kemudahan di Browser) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Konfigurasi Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOJY-vbe2bI_4ZkICQwjk7ddBgaS3Pn_w",
            authDomain: "nise-2026.firebaseapp.com",
            projectId: "nise-2026",
            storageBucket: "nise-2026.firebasestorage.app",
            messagingSenderId: "685241504060",
            appId: "1:685241504060:web:af50f4b77448c56901ce39",
            measurementId: "G-ZCF5839LV3"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Helper Icon Component (karena kita pakai Lucide via CDN)
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); // login, lobby, exam, results
            const [exams, setExams] = useState([]);
            const [selectedExam, setSelectedExam] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [studentName, setStudentName] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [status, setStatus] = useState("Menghubungkan...");

            // --- Auth Logic ---
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (!u) {
                        auth.signInAnonymously().catch(err => setError("Koneksi gagal: " + err.message));
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // --- Sync Data ---
            useEffect(() => {
                if (!user) return;
                
                // Mengambil dari koleksi 'exams' di level root agar kompatibel dengan testing Anda
                const unsubscribe = db.collection('exams').onSnapshot(
                    (snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setExams(list);
                        setStatus("Koneksi Berhasil!");
                    },
                    (err) => {
                        setStatus("Error Firestore: " + err.message);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            // --- Timer Logic ---
            useEffect(() => {
                if (view === 'exam' && timeLeft > 0) {
                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                handleSubmitExam();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }
            }, [view, timeLeft]);

            const handleStartExam = (exam) => {
                if (!studentName.trim()) {
                    setError("Silakan masukkan nama antum.");
                    return;
                }
                setError(null);
                setSelectedExam(exam);
                setAnswers({});
                setCurrentQuestionIndex(0);
                setTimeLeft((exam.duration || 30) * 60);
                setView('exam');
            };

            const handleSubmitExam = async () => {
                let correctCount = 0;
                selectedExam.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) correctCount++;
                });
                const score = Math.round((correctCount / selectedExam.questions.length) * 100);

                try {
                    await db.collection('results').add({
                        studentName,
                        examTitle: selectedExam.title,
                        score: score,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        userId: user.uid
                    });
                    setView('results');
                } catch (err) {
                    setError("Gagal mengirim hasil: " + err.message);
                }
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <Icon name="graduation-cap" className="w-5 h-5" />
                            </div>
                            <span className="font-extrabold text-xl tracking-tight text-indigo-900">NISE</span>
                        </div>
                        {view === 'exam' && (
                            <div className={`font-mono font-bold px-4 py-1.5 rounded-full flex items-center gap-2 ${timeLeft < 300 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-indigo-50 text-indigo-600'}`}>
                                <Icon name="clock" className="w-4 h-4" />
                                {formatTime(timeLeft)}
                            </div>
                        )}
                        {view !== 'login' && view !== 'exam' && (
                            <button onClick={() => setView('login')} className="text-slate-400 hover:text-red-500">
                                <Icon name="log-out" className="w-5 h-5" />
                            </button>
                        )}
                    </nav>

                    <main className="max-w-5xl mx-auto p-6 animate-fade-in">
                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-2xl flex items-center gap-3">
                                <Icon name="alert-circle" />
                                <span className="text-sm font-bold">{error}</span>
                            </div>
                        )}

                        {view === 'login' && (
                            <div className="max-w-md mx-auto mt-12 bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border border-indigo-50">
                                <div className="text-center mb-8">
                                    <h2 className="text-2xl font-extrabold text-slate-800">Selamat Datang</h2>
                                    <p className="text-slate-400 text-sm mt-1">Gunakan nama lengkap sesuai daftar hadir.</p>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">Nama Lengkap Siswa</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all font-semibold"
                                            placeholder="Contoh: Abdullah Mansur"
                                            value={studentName}
                                            onChange={(e) => setStudentName(e.target.value)}
                                        />
                                    </div>
                                    <button 
                                        onClick={() => studentName.trim() ? setView('lobby') : setError("Nama harus diisi")}
                                        className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all"
                                    >
                                        Masuk Dashboard
                                    </button>
                                    <div className="text-center">
                                        <span className={`text-[10px] font-bold px-3 py-1 rounded-full ${status.includes('Berhasil') ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50 text-slate-400'}`}>
                                            STATUS: {status.toUpperCase()}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'lobby' && (
                            <div className="space-y-8">
                                <div className="bg-indigo-600 rounded-[2.5rem] p-10 text-white shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-3xl font-black mb-2">Ahlan wa Sahlan, {studentName}!</h2>
                                        <p className="text-indigo-100 opacity-80 max-w-sm">Siapkan diri antum untuk mengerjakan ujian hari ini dengan jujur.</p>
                                    </div>
                                    <Icon name="book-open" className="absolute -right-12 -bottom-12 w-72 h-72 text-white opacity-10 rotate-12" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {exams.length === 0 ? (
                                        <div className="col-span-full py-20 text-center bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200">
                                            <Icon name="inbox" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                                            <p className="text-slate-400 font-bold">Belum ada paket ujian yang aktif.</p>
                                        </div>
                                    ) : (
                                        exams.map(exam => (
                                            <div key={exam.id} className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all">
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="bg-indigo-50 text-indigo-600 text-[10px] font-black px-3 py-1 rounded-full">{exam.category || 'UMUM'}</span>
                                                    <div className="flex items-center gap-1.5 text-slate-400 text-xs font-bold">
                                                        <Icon name="clock" className="w-3.5 h-3.5" />
                                                        {exam.duration} Menit
                                                    </div>
                                                </div>
                                                <h4 className="text-2xl font-bold mb-3">{exam.title}</h4>
                                                <p className="text-slate-500 text-sm mb-8 line-clamp-2">{exam.description || 'Petunjuk pengerjaan akan diberikan di dalam soal.'}</p>
                                                <button 
                                                    onClick={() => handleStartExam(exam)}
                                                    className="w-full flex items-center justify-center gap-2 bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-indigo-600 transition-all"
                                                >
                                                    Mulai Sekarang <Icon name="chevron-right" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'exam' && selectedExam && (
                            <div className="max-w-3xl mx-auto space-y-6">
                                <div className="flex justify-between items-center px-4">
                                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest">SOAL {currentQuestionIndex + 1} / {selectedExam.questions?.length}</span>
                                    <div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-600" style={{ width: `${((currentQuestionIndex+1)/selectedExam.questions.length)*100}%` }}></div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[3rem] p-10 md:p-14 shadow-2xl border border-indigo-50">
                                    <p className="text-xl md:text-2xl font-bold leading-relaxed mb-10 text-slate-800">
                                        {selectedExam.questions[currentQuestionIndex].text}
                                    </p>
                                    <div className="space-y-4">
                                        {selectedExam.questions[currentQuestionIndex].options.map((opt, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => setAnswers(p => ({...p, [selectedExam.questions[currentQuestionIndex].id]: idx}))}
                                                className={`w-full text-left p-6 rounded-2xl border-2 flex items-center gap-5 transition-all ${
                                                    answers[selectedExam.questions[currentQuestionIndex].id] === idx 
                                                    ? 'border-indigo-600 bg-indigo-50 text-indigo-900' 
                                                    : 'border-slate-50 bg-slate-50 hover:border-slate-200 text-slate-600'
                                                }`}
                                            >
                                                <span className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold ${answers[selectedExam.questions[currentQuestionIndex].id] === idx ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-400'}`}>
                                                    {String.fromCharCode(65 + idx)}
                                                </span>
                                                <span className="font-bold text-lg">{opt}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <button 
                                        disabled={currentQuestionIndex === 0}
                                        onClick={() => setCurrentQuestionIndex(p => p - 1)}
                                        className="flex-1 py-5 bg-white border border-slate-200 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 disabled:opacity-30"
                                    >Kembali</button>
                                    {currentQuestionIndex === selectedExam.questions.length - 1 ? (
                                        <button onClick={handleSubmitExam} className="flex-[2] py-5 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                                            <Icon name="send" className="w-5 h-5" /> Kumpulkan Jawaban
                                        </button>
                                    ) : (
                                        <button onClick={() => setCurrentQuestionIndex(p => p + 1)} className="flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                                            Berikutnya <Icon name="chevron-right" className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="max-w-md mx-auto text-center mt-12 bg-white p-12 rounded-[3.5rem] shadow-2xl">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8">
                                    <Icon name="check-circle" className="w-10 h-10" />
                                </div>
                                <h2 className="text-3xl font-black mb-2">Selesai!</h2>
                                <p className="text-slate-400 mb-8 font-medium">Jawaban antum telah masuk ke database Ma'had.</p>
                                <button onClick={() => setView('lobby')} className="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl">Kembali ke Dashboard</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
