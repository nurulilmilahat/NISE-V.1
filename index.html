<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISE - Ma'had Nurul Ilmi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBOJY-vbe2bI_4ZkICQwjk7ddBgaS3Pn_w",
            authDomain: "nise-2026.firebaseapp.com",
            projectId: "nise-2026",
            storageBucket: "nise-2026.firebasestorage.app",
            messagingSenderId: "685241504060",
            appId: "1:685241504060:web:af50f4b77448c56901ce39",
            measurementId: "G-ZCF5839LV3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [status, setStatus] = useState("Menghubungkan...");
            const [testData, setTestData] = useState([]);

            useEffect(() => {
                // Cek koneksi dengan mengambil koleksi 'exams'
                const unsub = db.collection('exams').onSnapshot(
                    (sn) => {
                        setStatus("Koneksi Berhasil!");
                        setTestData(sn.docs.map(d => d.data()));
                    },
                    (err) => setStatus("Error Firestore: " + err.message)
                );
                return () => unsub();
            }, []);

            return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-indigo-600">
                        <h1 className="text-4xl font-black text-indigo-600 mb-4">NISE</h1>
                        <div className={`px-6 py-2 rounded-full font-bold text-sm inline-block ${status.includes('Error') ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                            {status}
                        </div>
                        {status === "Koneksi Berhasil!" && (
                            <p className="mt-4 text-slate-400 text-xs font-bold uppercase tracking-widest">
                                Database Terhubung. Siap Memasukkan Soal.
                            </p>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
