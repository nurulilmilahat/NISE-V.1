                'edit': <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                'save': <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z M17 21v-8H7v8 M7 3v5h8" />,
                'copy': <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
                'chevron-up': <path d="m18 15-6-6-6 6"/>,
                'chevron-down': <path d="m6 9 6 6 6-6"/>,
                'zap': <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                'eye': <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                'eye-off': <><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a18.58 18.58 0 0 1-2.16 3.19"/><path d="M6.61 6.61A13.52 13.52 0 0 0 1 12s4 8 11 8c2.12 0 3.87-.69 5.26-1.72"/><line x1="1" y1="1" x2="23" y2="23"/></>,
                'shuffle': <><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></>,
                'calendar': <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                'search': <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
                'download': <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); 
            const [adminTab, setAdminTab] = useState('scores'); 
            const [exams, setExams] = useState([]); 
            const [results, setResults] = useState([]);
            const [selectedExam, setSelectedExam] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [studentName, setStudentName] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [successMsg, setSuccessMsg] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [adminPin, setAdminPin] = useState('');
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [bulkPoints, setBulkPoints] = useState('');
            const [showConfirmFinish, setShowConfirmFinish] = useState(false);
            const [examToEdit, setExamToEdit] = useState(null);
            const [previewExam, setPreviewExam] = useState(null);
            const [editingPreviewIdx, setEditingPreviewIdx] = useState(null);
            const [lastScore, setLastScore] = useState(0);
            const [selectedResults, setSelectedResults] = useState([]);
            const [showConfirmDelete, setShowConfirmDelete] = useState(false);
            const [singleDeleteId, setSingleDeleteId] = useState(null);
            const [reviewResult, setReviewResult] = useState(null);
            const [filterMapel, setFilterMapel] = useState('All');
            const [filterJudul, setFilterJudul] = useState('All');
            const [sortOption, setSortOption] = useState('Terbaru');

            const editorRef = useRef(null);

            const [pendingQuestion, setPendingQuestion] = useState({
                type: 'mcq', text: '', options: ['', '', '', ''], correctAnswer: 0, points: 10
            });

            const [newExam, setNewExam] = useState({
                title: '', duration: 30, category: '', kelas: '', questions: [], isRandomized: false, releaseTime: '', expiryTime: ''
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { setError(err.message); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const examsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams');
                return examsRef.onSnapshot((sn) => {
                    const list = sn.docs.map(d => ({ id: d.id, ...d.data() }));
                    setExams(list);
                }, (err) => setError(err.message));
            }, [user]);

            useEffect(() => {
                if (view === 'admin_dashboard' && user) {
                    const resultsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results');
                    return resultsRef.onSnapshot((sn) => {
                        const list = sn.docs.map(d => ({ id: d.id, ...d.data() }));
                        setResults(list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                    }, (err) => setError(err.message));
                }
            }, [view, user]);

            useEffect(() => {
                if (view === 'exam' && timeLeft > 0) {
                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) { 
                                handleSubmitExam(); 
                                return 0; 
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }
            }, [view, timeLeft]);

            useEffect(() => {
                if (successMsg) {
                    const t = setTimeout(() => setSuccessMsg(null), 3000);
                    return () => clearTimeout(t);
                }
            }, [successMsg]);

            const execEditorCommand = (cmd) => {
                document.execCommand(cmd, false, null);
                if (editorRef.current) {
                    setPendingQuestion(prev => ({ ...prev, text: editorRef.current.innerHTML }));
                }
            };

            const shuffleArray = (array) => {
                const shuffled = JSON.parse(JSON.stringify(array));
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const handleStartExam = (exam) => {
                const status = getExamScheduleStatus(exam);
                if (status.isLocked) {
                    setError(`Ujian belum dibuka. Akan dibuka pada: ${formatReadableDate(exam.releaseTime)}`);
                    return;
                }
                if (status.isExpired) {
                    setError("Ujian ini sudah berakhir dan tidak dapat dikerjakan lagi.");
                    return;
                }

                if (!studentName.trim()) { setError("Isi nama antum."); return; }
                setError(null); 
                
                let finalQuestions = [...exam.questions];
                if (exam.isRandomized) {
                    finalQuestions = shuffleArray(finalQuestions);
                }

                setSelectedExam({ ...exam, questions: finalQuestions });
                setAnswers({}); 
                setCurrentQuestionIndex(0); 
                setTimeLeft((exam.duration || 30) * 60); 
                setView('exam');
            };

            const handleAnswer = (qid, idx) => {
                setAnswers(prev => ({ ...prev, [qid]: idx }));
            };

            const handleSubmitExam = async () => {
                if (isSubmitting || !user) {
                    if (!user) setError("Koneksi gagal. Harap refresh halaman.");
                    return;
                }
                setIsSubmitting(true);
                setShowConfirmFinish(false);

                const q = selectedExam.questions || [];
                let totalPossible = 0, earned = 0;
                q.forEach(item => {
                    const pts = parseInt(item.points) || 10;
                    totalPossible += pts;
                    if (answers[item.id] === item.correctAnswer) earned += pts;
                });
                const finalScore = totalPossible > 0 ? Math.round((earned / totalPossible) * 100) : 0;
            
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                    studentName: studentName.trim(), 
                    examId: selectedExam.id, 
                    examTitle: selectedExam.title,
                    score: finalScore, 
                    earnedPoints: earned, 
                    totalPoints: totalPossible, 
                    answers,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
                    userId: user.uid
                });
                setLastScore(finalScore);
                setView('results');
                setError(null);
            } catch (err) { 
                setError("Gagal mengirim jawaban: " + err.message); 
            } finally { 
                setIsSubmitting(false); 
            }
        };

            const addPendingQuestionToExam = () => {
                const text = editorRef.current?.innerHTML || '';
                if (!text.trim() || text === '<br>') { setError("Teks pertanyaan tidak boleh kosong."); return; }
                
                let finalQuestion = { ...pendingQuestion, text, id: Date.now().toString() };
                if (pendingQuestion.type === 'tf') {
                    finalQuestion.options = ['Benar', 'Salah'];
                }

                setNewExam(prev => ({ ...prev, questions: [...prev.questions, finalQuestion] }));
                setError(null);
                setPendingQuestion({ type: 'mcq', text: '', options: ['', '', '', ''], correctAnswer: 0, points: 10 });
                if (editorRef.current) editorRef.current.innerHTML = '';
            };

            const handleImport = () => {
                setError(null);
                if (!importText.trim()) { setError("Teks impor kosong."); return; }
                
                try {
                    const lines = importText.split('\n').map(l => l.trim()).filter(l => l);
                    const newQuestions = [];

                    lines.forEach((line, index) => {
                        const parts = line.split('|').map(x => x.trim());
                        const qId = `imported-${Date.now()}-${index}-${Math.floor(Math.random() * 1000)}`;

                        if (parts.length === 4 && (parts[1].toUpperCase() === 'TF' || parts[1].toUpperCase() === 'BS')) {
                            newQuestions.push({
                                id: qId, text: parts[0], type: 'tf', options: ['Benar', 'Salah'], correctAnswer: parseInt(parts[2]) || 0, points: parseInt(parts[3]) || 10
                            });
                        } 
                        else if (parts.length >= 6) {
                            newQuestions.push({ 
                                id: qId, text: parts[0], type: 'mcq', options: [parts[1], parts[2], parts[3], parts[4]], correctAnswer: parseInt(parts[5]) || 0, points: parts[6] ? parseInt(parts[6]) : 10
                            });
                        }
                    });

                    if (newQuestions.length > 0) { 
                        setNewExam(prev => ({ ...prev, questions: [...prev.questions, ...newQuestions] })); 
                        setImportText(''); setShowImport(false); setError(null);
                    } else {
                        setError("Format impor tidak valid.");
                    }
                } catch (err) { setError("Gagal memproses impor: " + err.message); }
            };

            const handleDuplicateQuestion = (id) => {
                const qIndex = newExam.questions.findIndex(q => q.id === id);
                if (qIndex === -1) return;
                const qToDup = newExam.questions[qIndex];
                const newQ = { ...JSON.parse(JSON.stringify(qToDup)), id: `dup-${Date.now()}-${Math.floor(Math.random() * 1000)}` };
                const updatedQuestions = [...newExam.questions];
                updatedQuestions.splice(qIndex + 1, 0, newQ);
                setNewExam(prev => ({ ...prev, questions: updatedQuestions }));
            };

            const handleMoveQuestion = (id, direction) => {
                const index = newExam.questions.findIndex(q => q.id === id);
                if (index === -1) return;
                const targetIndex = direction === 'up' ? index - 1 : index + 1;
                if (targetIndex < 0 || targetIndex >= newExam.questions.length) return;
                const updated = [...newExam.questions];
                [updated[index], updated[targetIndex]] = [updated[targetIndex], updated[index]];
                setNewExam(prev => ({ ...prev, questions: updated }));
            };

            const handleUpdateInlineQuestion = (id, field, value) => {
                setNewExam(prev => ({
                    ...prev,
                    questions: prev.questions.map(q => {
                        if (q.id === id) {
                            if (field === 'option') {
                                const newOpts = [...q.options];
                                newOpts[value.idx] = value.val;
                                return { ...q, options: newOpts };
                            }
                            return { ...q, [field]: value };
                        }
                        return q;
                    })
                }));
            };

            const applyBulkPoints = () => {
                const pts = parseInt(bulkPoints);
                if (isNaN(pts)) { setError("Poin tidak valid."); return; }
                setNewExam(prev => ({ ...prev, questions: prev.questions.map(q => ({ ...q, points: pts })) }));
                setBulkPoints(''); setError(null);
                setSuccessMsg("Poin masal diterapkan!");
            };

            const handleToggleVisibility = async (exam) => {
                try {
                    const newStatus = exam.published === false ? true : false;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(exam.id).update({
                        published: newStatus
                    });
                } catch (err) { setError(err.message); }
            };

            const handleToggleShuffleMode = async (exam) => {
                try {
                    const newStatus = !exam.isRandomized;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(exam.id).update({
                        isRandomized: newStatus
                    });
                } catch (err) { setError(err.message); }
            };

            const handleToggleDraftShuffle = () => {
                setNewExam(prev => ({ ...prev, isRandomized: !prev.isRandomized }));
            };

            const saveNewExam = async () => {
                if (!newExam.title || newExam.questions.length === 0 || !newExam.category || !newExam.kelas) { 
                    setError("Lengkapi data Ujian."); return; 
                }
                setIsSubmitting(true);
                try {
                    const payload = {
                        ...newExam, duration: parseInt(newExam.duration),
                        published: newExam.published !== false, 
                        questions: newExam.questions.map(q => ({ ...q, points: parseInt(q.points) || 10 }))
                    };

                    if (newExam.id) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(newExam.id).update(payload);
                        setSuccessMsg("Paket ujian berhasil diperbarui!");
                    } else {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').add(payload);
                        setSuccessMsg("Paket ujian berhasil disimpan!");
                    }

                    setAdminTab('bank'); 
                    setNewExam({ title: '', duration: 30, category: '', kelas: '', questions: [], isRandomized: false, releaseTime: '', expiryTime: '' });
                    setError(null);
                } catch (err) { setError(err.message); } finally { setIsSubmitting(false); }
            };

            const handleSaveExamEdit = async () => {
                if (!examToEdit.title || !examToEdit.category || !examToEdit.kelas) {
                    setError("Lengkapi data Ujian."); return;
                }
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(examToEdit.id).update({
                        title: examToEdit.title,
                        duration: parseInt(examToEdit.duration),
                        category: examToEdit.category,
                        kelas: examToEdit.kelas,
                        releaseTime: examToEdit.releaseTime || '',
                        expiryTime: examToEdit.expiryTime || ''
                    });
                    setExamToEdit(null);
                    setError(null);
                    setSuccessMsg("Metadata ujian berhasil diperbarui!");
                } catch (err) { setError(err.message); } finally { setIsSubmitting(false); }
            };

            // Fitur Baru: Edit Langsung di Tinjauan
            const handleUpdatePreviewQuestion = (qIdx, field, value) => {
                setPreviewExam(prev => {
                    const updatedQuestions = [...prev.questions];
                    if (field === 'option') {
                        const newOptions = [...updatedQuestions[qIdx].options];
                        newOptions[value.oIdx] = value.val;
                        updatedQuestions[qIdx] = { ...updatedQuestions[qIdx], options: newOptions };
                    } else {
                        updatedQuestions[qIdx] = { ...updatedQuestions[qIdx], [field]: value };
                    }
                    return { ...prev, questions: updatedQuestions };
                });
            };

            const handleSavePreviewChanges = async () => {
                if (!previewExam) return;
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(previewExam.id).update({
                        questions: previewExam.questions.map(q => ({ ...q, points: parseInt(q.points) || 10 }))
                    });
                    setPreviewExam(null);
                    setSuccessMsg("Perubahan isi soal berhasil disimpan!");
                    setError(null);
                } catch (err) { 
                    setError("Gagal menyimpan perubahan: " + err.message); 
                } finally { 
                    setIsSubmitting(false); 
                }
            };

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
            const formatDate = (ts) => ts ? ts.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : "-";
            const formatReadableDate = (iso) => iso ? new Date(iso).toLocaleString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : "-";

            const availableJudul = [...new Set(results.filter(res => {
                if (filterMapel === 'All') return true;
                const mapel = res.examCategory || (exams.find(e => e.id === res.examId)?.category || '-');
                return mapel === filterMapel;
            }).map(r => r.examTitle))].filter(Boolean);

            const filteredResults = results.filter(res => {
                const mapel = res.examCategory || (exams.find(e => e.id === res.examId)?.category || '-');
                const matchMapel = filterMapel === 'All' || mapel === filterMapel;
                const matchJudul = filterJudul === 'All' || res.examTitle === filterJudul;
                return matchMapel && matchJudul;
            }).sort((a, b) => {
                switch (sortOption) {
                    case 'Terlama':
                        return (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0);
                    case 'Tertinggi':
                        return b.score - a.score;
                    case 'Terendah':
                        return a.score - b.score;
                    case 'NamaA-Z':
                        return (a.studentName || '').localeCompare(b.studentName || '');
                    case 'NamaZ-A':
                        return (b.studentName || '').localeCompare(a.studentName || '');
                    case 'Terbaru':
                    default:
                        return (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0);
                }
            });

            const exportToExcel = () => {
                if (filteredResults.length === 0) return;
                
                let csvContent = "Siswa,Mapel,Judul Ujian,Skor,Waktu\n";
                
                filteredResults.forEach(res => {
                    const mapel = res.examCategory || (exams.find(e => e.id === res.examId)?.category || '-');
                    const waktu = formatDate(res.timestamp);
                    
                    const row = [
                        `"${res.studentName || ''}"`,
                        `"${mapel}"`,
                        `"${res.examTitle || ''}"`,
                        `"${res.score || 0}"`,
                        `"${waktu}"`
                    ].join(',');
                    
                    csvContent += row + "\n";
                });
                
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Data_Nilai_${filterMapel === 'All' ? 'SemuaMapel' : filterMapel}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const deleteExam = (id) => {
                if (!confirm("Hapus paket soal ini?")) return;
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(id).delete().catch(err => setError(err.message));
            };

            const handleSelectAllResult = (e) => {
                if (e.target.checked) {
                    setSelectedResults(filteredResults.map(r => r.id));
                } else {
                    setSelectedResults([]);
                }
            };

            const handleSelectResult = (id) => {
                setSelectedResults(prev => 
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            const handleDeleteSelectedResults = () => {
                if (selectedResults.length === 0) return;
                setShowConfirmDelete(true);
            };

            const executeDeleteSelectedResults = async () => {
                setShowConfirmDelete(false);
                setIsSubmitting(true);
                try {
                    const count = selectedResults.length;
                    const promises = selectedResults.map(id => 
                        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(id).delete()
                    );
                    await Promise.all(promises);
                    setSelectedResults([]);
                    setSuccessMsg(`${count} data nilai berhasil dihapus.`);
                    setError(null);
                } catch (err) {
                    setError("Gagal menghapus data: " + err.message);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const executeSingleDelete = async () => {
                if (!singleDeleteId) return;
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(singleDeleteId).delete();
                    setSuccessMsg("1 data nilai berhasil dihapus.");
                    setSingleDeleteId(null);
                    setError(null);
                } catch (err) {
                    setError("Gagal menghapus data: " + err.message);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const getExamScheduleStatus = (exam) => {
                if (!exam.releaseTime && !exam.expiryTime) return { isLocked: false, isExpired: false, label: null };
                const now = new Date();
                const release = exam.releaseTime ? new Date(exam.releaseTime) : null;
                const expiry = exam.expiryTime ? new Date(exam.expiryTime) : null;
                
                if (release && now < release) return { isLocked: true, isExpired: false, label: "Belum Dimulai" };
                if (expiry && now > expiry) return { isLocked: false, isExpired: true, label: "Berakhir" };
                return { isLocked: false, isExpired: false, label: "Aktif" };
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><Icon name="graduation-cap" /></div>
                            <div className="flex flex-col"><span className="font-extrabold text-lg text-indigo-900 leading-none">NISE</span><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">NURUL ILMI SMART EXAM</span></div>
                        </div>
                        <div className="flex items-center gap-4">
                            {view === 'exam' && selectedExam && <div className={`px-4 py-1.5 rounded-2xl font-mono font-bold flex items-center gap-2 ${timeLeft < 300 ? 'bg-red-50 text-red-600 animate-pulse' : 'bg-indigo-50 text-indigo-700'}`}><Icon name="clock" className="w-4 h-4" />{formatTime(timeLeft)}</div>}
                            {(view !== 'login' && view !== 'admin_login' && view !== 'review' && view !== 'results') && <button onClick={() => setView('login')} className="text-slate-400 hover:text-red-500 transition-colors"><Icon name="log-out" /></button>}
                        </div>
                    </nav>

                    <main className="flex-1 max-w-5xl mx-auto w-full p-6 animate-fade-in relative">
                        {error && <div className="mb-6 p-4 bg-red-50 border-2 border-red-200 text-red-700 rounded-2xl flex items-center gap-3 shadow-sm animate-fade-in"><Icon name="alert-circle" /><span className="text-sm font-bold">{error}</span></div>}
                        {successMsg && <div className="mb-6 p-4 bg-emerald-50 border-2 border-emerald-200 text-emerald-700 rounded-2xl flex items-center gap-3 shadow-sm animate-fade-in"><Icon name="check-circle-2" /><span className="text-sm font-bold">{successMsg}</span></div>}

                        {view === 'login' && (
                            <div className="max-w-md mx-auto mt-12 flex flex-col gap-6">
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border">
                                    <div className="text-center mb-10"><h2 className="text-3xl font-black text-slate-800 tracking-tight">Pintu Masuk Siswa</h2><p className="text-slate-400 text-sm mt-2">Masukan identitas lengkap antum.</p></div>
                                    <div className="space-y-6">
                                        <div className="relative"><Icon name="user" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /><input type="text" className="w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-600 outline-none font-semibold transition-all" placeholder="Nama Lengkap" value={studentName} onChange={(e) => setStudentName(e.target.value)} /></div>
                                        <button onClick={() => studentName.trim() ? setView('lobby') : setError("Nama kosong")} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">Masuk Dashboard <Icon name="arrow-right" /></button>
                                    </div>
                                </div>
                                <button onClick={() => { setView('admin_login'); setError(null); }} className="text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-indigo-600 transition-colors text-center">Login sebagai Guru</button>
                            </div>
                        )}

                        {view === 'admin_login' && (
                            <div className="max-w-md mx-auto mt-12 bg-white p-10 rounded-[2.5rem] shadow-xl border">
                                <div className="text-center mb-10"><h2 className="text-3xl font-black text-slate-800 tracking-tight">Akses Guru</h2><p className="text-slate-400 text-sm mt-2">Masukan PIN untuk akses panel.</p></div>
                                <div className="space-y-6">
                                    <input type="password" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-600 outline-none text-center tracking-[1em]" placeholder="****" value={adminPin} onChange={(e) => setAdminPin(e.target.value)} />
                                    <button onClick={() => adminPin === 'a' ? setView('admin_dashboard') : setError("PIN Salah")} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-black transition-all flex items-center justify-center gap-2">Masuk Panel Guru <Icon name="shield-check" /></button>
                                    <button onClick={() => setView('login')} className="w-full text-slate-400 text-xs font-bold">Kembali</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin_dashboard' && (
                            <div className="space-y-6">
                                <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                    {[{id:'scores', label:'Nilai', icon:'clipboard-list'}, {id:'bank', label:'Bank Soal', icon:'database'}, {id:'create', label:'Buat Soal', icon:'plus-circle'}].map(tab => (
                                        <button key={tab.id} onClick={() => setAdminTab(tab.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold text-sm whitespace-nowrap transition-all ${adminTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 hover:bg-slate-100'}`}><Icon name={tab.icon} className="w-4 h-4" />{tab.label}</button>
                                    ))}
                                </div>

                                {adminTab === 'scores' && (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
                                            <div className="flex flex-wrap items-center gap-4">
                                                <div className="text-sm font-bold text-slate-600">
                                                    {selectedResults.length > 0 ? `${selectedResults.length} data dipilih` : 'Daftar Nilai Siswa'}
                                                </div>
                                                <div className="hidden sm:block w-px h-6 bg-slate-200"></div>
                                                <select 
                                                    value={filterMapel} 
                                                    onChange={e => { setFilterMapel(e.target.value); setFilterJudul('All'); setSelectedResults([]); }}
                                                    className="text-xs font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer py-1.5 pl-3 pr-8 hover:bg-slate-100 focus:border-indigo-500 transition-all shadow-sm"
                                                >
                                                    <option value="All">Semua Mapel</option>
                                                    {MAPEL_LIST.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                                <select 
                                                    value={filterJudul} 
                                                    onChange={e => { setFilterJudul(e.target.value); setSelectedResults([]); }}
                                                    className="text-xs font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer py-1.5 pl-3 pr-8 hover:bg-slate-100 focus:border-indigo-500 transition-all shadow-sm max-w-[200px] truncate"
                                                >
                                                    <option value="All">Semua Judul Ujian</option>
                                                    {availableJudul.map(j => <option key={j} value={j}>{j}</option>)}
                                                </select>
                                                <select 
                                                    value={sortOption} 
                                                    onChange={e => setSortOption(e.target.value)}
                                                    className="text-xs font-bold text-slate-600 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer py-1.5 pl-3 pr-8 hover:bg-slate-100 focus:border-indigo-500 transition-all shadow-sm max-w-[150px]"
                                                >
                                                    <option value="Terbaru">Terbaru</option>
                                                    <option value="Terlama">Terlama</option>
                                                    <option value="Tertinggi">Nilai Tertinggi</option>
                                                    <option value="Terendah">Nilai Terendah</option>
                                                    <option value="NamaA-Z">Nama (A-Z)</option>
                                                    <option value="NamaZ-A">Nama (Z-A)</option>
                                                </select>
                                                <button onClick={exportToExcel} className="flex items-center gap-2 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-1.5 hover:bg-emerald-100 focus:border-emerald-500 transition-all shadow-sm">
                                                    <Icon name="download" className="w-4 h-4" /> Ekspor
                                                </button>
                                            </div>
                                            {selectedResults.length > 0 && (
                                                <button onClick={handleDeleteSelectedResults} disabled={isSubmitting} className="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl text-xs font-black uppercase transition-all">
                                                    <Icon name="trash-2" className="w-4 h-4" /> Hapus Terpilih
                                                </button>
                                            )}
                                        </div>

                                        <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b">
                                                            <th className="px-6 py-4 w-10">
                                                                <input type="checkbox" className="w-4 h-4 accent-indigo-600 rounded cursor-pointer" checked={filteredResults.length > 0 && selectedResults.length === filteredResults.length} onChange={handleSelectAllResult} />
                                                            </th>
                                                            <th className="px-6 py-4">Siswa</th>
                                                            <th className="px-6 py-4">Mapel</th>
                                                            <th className="px-6 py-4">Judul Ujian</th>
                                                            <th className="px-6 py-4">Skor</th>
                                                            <th className="px-6 py-4">Waktu</th>
                                                            <th className="px-6 py-4 text-center">Aksi</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y text-sm">
                                                        {filteredResults.map(res => {
                                                            const mapel = res.examCategory || (exams.find(e => e.id === res.examId)?.category || '-');
                                                            return (
                                                                <tr key={res.id} className={`hover:bg-slate-50/50 transition-colors ${selectedResults.includes(res.id) ? 'bg-indigo-50/50' : ''}`}>
                                                                    <td className="px-6 py-4">
                                                                        <input type="checkbox" className="w-4 h-4 accent-indigo-600 rounded cursor-pointer" checked={selectedResults.includes(res.id)} onChange={() => handleSelectResult(res.id)} />
                                                                    </td>
                                                                    <td className="px-6 py-4 font-bold text-slate-700">{res.studentName}</td>
                                                                    <td className="px-6 py-4"><span className="text-[10px] font-black uppercase text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{mapel}</span></td>
                                                                    <td className="px-6 py-4 text-slate-500">{res.examTitle}</td>
                                                                    <td className="px-6 py-4"><span className={`px-2 py-0.5 rounded-lg font-black text-xs ${res.score >= 70 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>{res.score}</span></td>
                                                                    <td className="px-6 py-4 text-slate-400 text-xs">{formatDate(res.timestamp)}</td>
                                                                    <td className="px-6 py-4 text-center">
                                                                        <div className="flex items-center justify-center gap-2">
                                                                            <button onClick={() => setReviewResult(res)} className="p-1.5 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-all" title="Review Jawaban">
                                                                                <Icon name="eye" className="w-4 h-4" />
                                                                            </button>
                                                                            <button onClick={() => setSingleDeleteId(res.id)} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Hapus Nilai">
                                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                                            </button>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        {showConfirmDelete && (
                                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[16px] z-[100] flex items-center justify-center p-6 animate-fade-in">
                                                <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border border-slate-100">
                                                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                        <Icon name="trash-2" className="w-8 h-8" />
                                                    </div>
                                                    <h3 className="text-xl font-black text-slate-800 mb-2 uppercase">Hapus Data Nilai</h3>
                                                    <p className="text-slate-400 text-sm mb-8 font-medium">Apakah antum yakin ingin menghapus {selectedResults.length} data nilai yang dipilih?</p>
                                                    <div className="flex flex-col gap-3">
                                                        <button onClick={executeDeleteSelectedResults} disabled={isSubmitting} className="w-full py-4 bg-red-600 text-white font-black rounded-2xl text-xs uppercase shadow-lg hover:bg-red-700 transition-all active:scale-95">Ya, Hapus Sekarang</button>
                                                        <button onClick={() => setShowConfirmDelete(false)} className="w-full py-4 bg-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase hover:bg-slate-200 transition-all">Batalkan</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {singleDeleteId && (
                                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[16px] z-[100] flex items-center justify-center p-6 animate-fade-in">
                                                <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border border-slate-100">
                                                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                        <Icon name="trash-2" className="w-8 h-8" />
                                                    </div>
                                                    <h3 className="text-xl font-black text-slate-800 mb-2 uppercase">Hapus Data Nilai</h3>
                                                    <p className="text-slate-400 text-sm mb-8 font-medium">Apakah antum yakin ingin menghapus data nilai ini?</p>
                                                    <div className="flex flex-col gap-3">
                                                        <button onClick={executeSingleDelete} disabled={isSubmitting} className="w-full py-4 bg-red-600 text-white font-black rounded-2xl text-xs uppercase shadow-lg hover:bg-red-700 transition-all active:scale-95">Ya, Hapus</button>
                                                        <button onClick={() => setSingleDeleteId(null)} className="w-full py-4 bg-slate-100 text-slate-400 font-black rounded-2xl text-[10px] uppercase hover:bg-slate-200 transition-all">Batalkan</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {reviewResult && (() => {
                                            const exam = exams.find(e => e.id === reviewResult.examId);
                                            
                                            if (!exam) {
                                                return (
                                                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[16px] z-[100] flex items-center justify-center p-6 animate-fade-in">
                                                        <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border border-slate-100">
                                                            <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-circle" className="w-8 h-8" /></div>
                                                            <h3 className="text-xl font-black text-slate-800 mb-2 uppercase">Data Tidak Lengkap</h3>
                                                            <p className="text-slate-400 text-sm mb-8 font-medium">Bank soal untuk ujian ini kemungkinan sudah dihapus. Detail jawaban tidak dapat ditampilkan.</p>
                                                            <button onClick={() => setReviewResult(null)} className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl text-[10px] uppercase transition-all">Tutup</button>
                                                        </div>
                                                    </div>
                                                );
                                            }

                                            return (
                                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[20px] z-[100] flex items-center justify-center p-4 sm:p-6 animate-fade-in">

                                                                const isCorrect = userAns === q.correctAnswer;

                                                                    <div key={q.id} className={`p-6 bg-white rounded-[2.5rem] border-2 shadow-sm transition-all ${isCorrect ? 'border-emerald-100' : 'border-red-100'}`}>

                                                                            </span>

                                                                                    </div>

                                                </div>

                                                                    </div>

                                                                                    <span className="text-xs font-bold truncate">{opt}</span>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    </>

                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                                            </div>
                                                        </div>

                                                            {isSubmitting ? "Menyimpan..." : "Simpan Perubahan"}

                                                            Batal
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </>
                                )}

                                            <button onClick={() => setShowImport(!showImport)} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition-all">

                                                            </div>
                                                        ))}
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-3 animate-fade-in">
                                                        {['Benar', 'Salah'].map((label, idx) => (

                                                                <span className="text-sm font-black uppercase">{label}</span>
                                                                <div className={`w-5 h-5 rounded-full border-2 ${pendingQuestion.correctAnswer === idx ? 'border-indigo-500 bg-indigo-500' : 'border-slate-200'}`}></div>

                                                    </div>

                                                                        ) : (
                                                                            <span className="text-sm font-bold truncate">{opt || '-'}</span>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                        <button onClick={saveNewExam} disabled={isSubmitting} className="w-full py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-xl uppercase active:scale-95 transition-all">{isSubmitting ? "MENYIMPAN..." : (newExam.id ? "SIMPAN PERUBAHAN PAKET" : "SIMPAN PAKET UJIAN")}</button>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                                                {exam.kelas && <span className="bg-emerald-50 text-emerald-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">Kls {exam.kelas}</span>}

                                                    </div>

                                                    <button

                                                    </button>

                        {view === 'exam' && selectedExam && (
                            <div className="max-w-3xl mx-auto space-y-6 animate-fade-in">
                                <div className="flex justify-between items-center bg-white p-4 rounded-[1.5rem] border shadow-sm"><div className="flex items-center gap-3"><div className="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600 font-black text-xs">{currentQuestionIndex + 1}</div><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{currentQuestionIndex + 1} / {selectedExam.questions?.length}</span></div><div className="w-32 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-600 transition-all" style={{ width: `${((currentQuestionIndex + 1) / (selectedExam.questions?.length || 1)) * 100}%` }}></div></div></div>

                                    <div className="flex justify-between items-start mb-10"><div className="flex-1 pr-10"><div className="flex gap-2 mb-2">{selectedExam.category && <span className="text-[10px] font-black text-indigo-600 uppercase">{selectedExam.category}</span>}{selectedExam.kelas && <span className="text-[10px] font-black text-emerald-600 uppercase">• Kls {selectedExam.kelas}</span>}</div><div className="text-lg md:text-xl font-bold leading-relaxed prose-render prose" dangerouslySetInnerHTML={{ __html: selectedExam.questions?.[currentQuestionIndex]?.text }}></div></div><div className="text-[9px] font-black text-indigo-400 bg-indigo-50 px-2 py-1 rounded-md">{selectedExam.questions?.[currentQuestionIndex]?.points || 10} Pts</div></div>

                                    </div>

                                <div className="flex gap-4"><button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-4 bg-white border rounded-2xl font-bold text-slate-400 disabled:opacity-30 text-xs transition-all uppercase">KEMBALI</button>{currentQuestionIndex === (selectedExam.questions?.length || 0) - 1 ? <button onClick={() => setShowConfirmFinish(true)} disabled={isSubmitting} className="flex-[2] py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 text-xs uppercase active:scale-95">{isSubmitting ? "..." : <><Icon name="send" /> SELESAI</>}</button> : <button onClick={() => setCurrentQuestionIndex(p => p + 1)} className="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 text-xs uppercase hover:bg-indigo-700 transition-all active:scale-95">LANJUT <Icon name="arrow-right" /></button>}</div>

                                            <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <Icon name="alert-circle" className="w-8 h-8" />

                                        </div>
                                    </div>

                                </div>
                            </div>

                                    </div>
                                    <button onClick={() => setView('lobby')} className="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-black uppercase hover:bg-slate-200 transition-all">Dashboard</button>

                                <div className="space-y-4">

                                                    </div>
                                                </div>
                                                <div className="text-base font-bold text-slate-800 mb-8 prose-render prose prose-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: q.text }}></div>
                                                
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                    {q.options.map((opt, oIdx) => {
                                                        const isSelected = userAns === oIdx;
                                                        const isCorrectOpt = q.correctAnswer === oIdx;
                                                        
                                                        let bgColor = 'bg-slate-50 border-slate-100 text-slate-400';
                                                        if (isCorrectOpt) bgColor = 'bg-emerald-50 border-emerald-500 text-emerald-700 font-bold';
                                                        else if (isSelected && !isCorrectOpt) bgColor = 'bg-red-50 border-red-500 text-red-700 font-bold';

                                                        return (
                                                            <div key={oIdx} className={`px-4 py-3 rounded-xl border flex items-center gap-3 transition-all ${bgColor}`}>
                                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs flex-shrink-0 ${isCorrectOpt ? 'bg-emerald-500 text-white' : (isSelected ? 'bg-red-500 text-white' : 'bg-white border text-slate-300')}`}>
                                                                    {q.type === 'tf' ? (oIdx === 0 ? 'B' : 'S') : String.fromCharCode(65 + oIdx)}
                                                                </div>
                                                                <span className="text-sm">{opt}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="pt-8 pb-12 flex justify-center">
                                    <button onClick={() => setView('lobby')} className="px-10 py-4 bg-slate-900 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">Kembali ke Dashboard</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center opacity-20"><span className="text-[9px] font-black uppercase tracking-[0.3em]">NISE SECURE PROTOCOL V3.9</span></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
