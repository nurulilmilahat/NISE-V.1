<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NISE - Smart Exam System</title>
    <!-- Library Pendukung -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .animate-in { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { BookOpen, Lock, LogOut, Database, PlusCircle, Trash2, Settings, ChevronRight } = lucide;

        // --- KONFIGURASI FIREBASE IKRAM ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOJY-vbe2bI_4ZkICQwjk7ddBgaS3Pn_w",
            authDomain: "nise-2026.firebaseapp.com",
            projectId: "nise-2026",
            storageBucket: "nise-2026.firebasestorage.app",
            messagingSenderId: "685241504060",
            appId: "1:685241504060:web:af50f4b77448c56901ce39",
            measurementId: "G-ZCF5839LV3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [view, setView] = useState('front');
            const [loading, setLoading] = useState(true);
            const [exams, setExams] = useState([]);
            const [student, setStudent] = useState({ name: '', class: '', subject: '', fileId: '' });
            const [teacherAuth, setTeacherAuth] = useState({ user: '', pass: '', show: false });

            useEffect(() => {
                // Langsung hubungkan ke koleksi 'exams'
                const unsub = db.collection('exams').onSnapshot(sn => {
                    setExams(sn.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, err => {
                    console.error(err);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center">
                    <div className="text-center">
                        <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-bold text-indigo-600 text-xs tracking-widest">MENGHUBUNGKAN KE NISE...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* TAMPILAN DEPAN SANTRI */}
                    {view === 'front' && (
                        <div className="h-screen flex items-center justify-center p-4">
                            <div className="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl border border-indigo-50 animate-in overflow-hidden">
                                <div className="bg-indigo-600 p-8 text-center text-white">
                                    <BookOpen size={32} className="mx-auto mb-2 opacity-50" />
                                    <h1 className="text-2xl font-black">NISE</h1>
                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">Ma'had Nurul Ilmi</p>
                                </div>
                                <div className="p-6 space-y-3 font-bold">
                                    <input type="text" placeholder="Nama Lengkap" className="w-full p-3 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500 transition-all" value={student.name} onChange={e => setStudent({...student, name: e.target.value})} />
                                    <select className="w-full p-3 bg-slate-50 rounded-xl outline-none" value={student.class} onChange={e => setStudent({...student, class: e.target.value})}>
                                        <option value="">-- Pilih Kelas --</option>
                                        <option value="VII">Kelas VII</option>
                                        <option value="VIII">Kelas VIII</option>
                                        <option value="IX">Kelas IX</option>
                                    </select>
                                    <button className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 active:scale-95 transition-all mt-2">MULAI UJIAN</button>
                                    <button onClick={() => setTeacherAuth({...teacherAuth, show: true})} className="w-full text-slate-300 text-[9px] uppercase font-black tracking-widest pt-4 flex items-center justify-center gap-2">
                                        <Lock size={10} /> Area Guru
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LOGIN GURU */}
                    {teacherAuth.show && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-[2rem] p-6 shadow-2xl text-center animate-in">
                                <h3 className="font-black text-slate-800 mb-4 uppercase text-sm">Akses Guru</h3>
                                <input type="text" placeholder="User" className="w-full p-3 bg-slate-50 rounded-xl mb-2 outline-none border" onChange={e => setTeacherAuth({...teacherAuth, user: e.target.value})} />
                                <input type="password" placeholder="Pass" className="w-full p-3 bg-slate-50 rounded-xl mb-4 outline-none border" onChange={e => setTeacherAuth({...teacherAuth, pass: e.target.value})} />
                                <div className="flex gap-2 font-bold">
                                    <button onClick={() => {if(teacherAuth.user === 'a' && teacherAuth.pass === 'a') setView('teacher'); setTeacherAuth({...teacherAuth, show: false})}} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl text-xs">MASUK</button>
                                    <button onClick={() => setTeacherAuth({...teacherAuth, show: false})} className="flex-1 py-3 bg-slate-100 text-slate-400 rounded-xl text-xs">BATAL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DASHBOARD GURU */}
                    {view === 'teacher' && (
                        <div className="p-6 max-w-4xl mx-auto animate-in">
                            <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border space-y-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-black text-indigo-600 uppercase">Panel Guru</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Manajemen Ujian NISE</p>
                                    </div>
                                    <button onClick={() => setView('front')} className="p-3 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all"><LogOut size={20}/></button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="p-6 bg-indigo-50 rounded-3xl border border-indigo-100 flex items-center justify-between group cursor-pointer hover:bg-indigo-600 transition-all">
                                        <div>
                                            <Database size={24} className="text-indigo-600 group-hover:text-white mb-2" />
                                            <h4 className="font-black text-indigo-900 group-hover:text-white uppercase text-xs">Bank Soal</h4>
                                        </div>
                                        <ChevronRight className="text-indigo-300 group-hover:text-white" />
                                    </div>
                                    <div className="p-6 bg-emerald-50 rounded-3xl border border-emerald-100 flex items-center justify-between group cursor-pointer hover:bg-emerald-600 transition-all">
                                        <div>
                                            <PlusCircle size={24} className="text-emerald-600 group-hover:text-white mb-2" />
                                            <h4 className="font-black text-emerald-900 group-hover:text-white uppercase text-xs">Buat Ujian Baru</h4>
                                        </div>
                                        <ChevronRight className="text-emerald-300 group-hover:text-white" />
                                    </div>
                                </div>

                                <div className="pt-4">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Ujian Aktif</h3>
                                    <div className="space-y-2">
                                        {exams.length === 0 ? (
                                            <p className="text-center py-10 text-slate-300 italic text-xs font-bold">Belum ada file ujian di database.</p>
                                        ) : (
                                            exams.map(ex => (
                                                <div key={ex.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border hover:border-indigo-300 transition-all">
                                                    <span className="font-bold text-sm text-slate-700">{ex.title}</span>
                                                    <div className="flex gap-2">
                                                        <button className="p-2 text-slate-400 hover:text-indigo-600"><Settings size={16}/></button>
                                                        <button onClick={() => db.collection('exams').doc(ex.id).delete()} className="p-2 text-slate-400 hover:text-red-500"><Trash2 size={16}/></button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
